workflow:
  name: docs-workflow
  description: Multi-stage documentation workflow for a JIRA ticket. Requirements analysis, planning, writing, technical review, style review, and optionally JIRA creation.

  # All step outputs go to: artifacts/<ticket>/<step-name>/
  # Each step reads its inputs from upstream step folders by convention.
  steps:
    - name: requirements
      skill: docs-tools:docs-workflow-requirements
      description: Analyze documentation requirements

    - name: planning
      skill: docs-tools:docs-workflow-planning
      description: Create documentation plan
      inputs: [requirements]

    - name: prepare-branch
      skill: docs-tools:docs-workflow-prepare-branch
      description: Create a fresh branch from latest upstream default branch
      inputs: [planning]

    - name: writing
      skill: docs-tools:docs-workflow-writing
      description: Write documentation
      inputs: [planning, prepare-branch]

    - name: technical-review
      skill: docs-tools:docs-workflow-tech-review
      description: Technical accuracy review
      inputs: [writing]

    - name: style-review
      skill: docs-tools:docs-workflow-style-review
      description: Style guide compliance review
      inputs: [writing, technical-review]

    - name: commit
      skill: docs-tools:docs-workflow-commit
      description: Commit and push documentation changes
      inputs: [writing, style-review, technical-review]

    - name: create-mr
      skill: docs-tools:docs-workflow-create-mr
      description: Create merge request or pull request
      inputs: [commit]

    - name: create-jira
      skill: docs-tools:docs-workflow-create-jira
      description: Create linked JIRA ticket
      when: create_jira_project
      inputs: [planning]
