# ACP headless variant — 7 steps (no prepare-branch or create-jira).
# Repo setup (cloning) is handled externally by batch-controller's repo-setup.sh.
# For the full interactive workflow, see: plugins/docs-tools/skills/docs-orchestrator/defaults/docs-workflow.yaml
# Invoked via: --workflow acp
workflow:
  name: docs-acp
  description: Headless documentation pipeline for scheduled ACP sessions.
  steps:
    - name: requirements
      skill: docs-tools:docs-workflow-requirements
      description: Analyze documentation requirements from JIRA ticket
    - name: planning
      skill: docs-tools:docs-workflow-planning
      description: Create documentation plan with JTBD framework
      inputs: [requirements]
    - name: writing
      skill: docs-tools:docs-workflow-writing
      description: Write complete documentation modules
      inputs: [planning]
    - name: technical-review
      skill: docs-tools:docs-workflow-tech-review
      description: Technical accuracy review
      inputs: [writing]
    - name: style-review
      skill: docs-tools:docs-workflow-style-review
      description: Style guide compliance review
      inputs: [writing, technical-review]

    - name: commit
      skill: docs-tools:docs-workflow-commit
      description: Commit and push documentation changes
      inputs: [writing, style-review, technical-review]

    - name: create-mr
      skill: docs-tools:docs-workflow-create-mr
      description: Create merge request or pull request
      inputs: [commit]
