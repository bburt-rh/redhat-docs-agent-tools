[project]
site_name = "Red Hat Docs Agent Tools"
site_description = "Claude Code plugins, skills, and agent tools for Red Hat documentation workflows"
site_url = "https://aireilly.github.io/redhat-docs-agent-tools/"
repo_url = "https://github.com/aireilly/redhat-docs-agent-tools"
edit_uri = "edit/main/docs/"
nav = [
    {"Home" = [
        {"Overview" = "index.md"},
        {"Quick start" = "quick-start.md"},
    ]},
    {"Plugins" = [
        {"Browse plugins" = "plugins.md"},
    ]},
    {"Installing" = [
        {"Installation" = "installing/index.md"},
    ]},
    {"Contributing" = [
        {"Contributing" = "contributing/index.md"},
        {"Creating a new plugin" = "contributing/creating-a-new-plugin.md"},
    ]},
]

[project.theme]
logo = "images/logo.svg"
favicon = "images/favicon.png"
features = [
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.expand",
    "content.action.edit",
    "content.action.view",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]